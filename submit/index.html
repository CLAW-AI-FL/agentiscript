<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Submit an Icon — AgentiScript</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;color:#fff;font-family:system-ui,sans-serif}nav{display:flex;gap:20px;justify-content:center;padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap}nav a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem}nav a:hover{color:#9F792C}.hero{text-align:center;padding:60px 24px 40px}.logo{font-size:1.5rem;font-weight:800;color:#9F792C}h1{font-size:2rem;margin:12px 0}p{color:rgba(255,255,255,0.5);font-size:0.9rem}.form-wrap{max-width:560px;margin:0 auto;padding:40px 24px}.field{margin-bottom:20px}label{display:block;font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:6px}input,textarea,select{width:100%;padding:10px 14px;background:#0a0a0a;border:1px solid rgba(159,121,44,0.3);border-radius:6px;color:#fff;font-size:0.9rem;font-family:inherit}textarea{height:80px;resize:vertical}button{width:100%;padding:12px;background:#9F792C;border:none;border-radius:6px;color:#000;font-weight:700;font-size:1rem;cursor:pointer}button:hover{background:#b8892f}.success{color:#9F792C;text-align:center;padding:20px;display:none}footer{padding:32px;text-align:center;color:rgba(255,255,255,0.2);font-size:0.75rem;border-top:1px solid rgba(255,255,255,0.06);margin-top:40px}</style></head>
<body>
<nav><a href="/">Home</a><a href="/icons/">Icons</a><a href="/store/">Pro Pack</a><a href="/docs/">Docs</a><a href="/submit/">Submit</a></nav>
<div class="hero"><div class="logo">AgentiScript</div><h1>Think we missed one?</h1><p>The agentic economy moves fast. Help us keep up.</p></div>
<div class="form-wrap">
<form id="submitForm">
<div class="field"><label>Concept Name</label><input type="text" id="concept" placeholder="e.g. Delegated Autonomy" required></div>
<div class="field"><label>Definition</label><textarea id="definition" placeholder="What does this concept mean?" required></textarea></div>
<div class="field"><label>Category</label><select id="category"><option value="agentic-economy">Agentic Economy</option><option value="blockchain">Blockchain / Web3</option><option value="science">Science / Technology</option><option value="economics">Economics / Finance</option><option value="philosophy">Philosophy / Thought</option><option value="other">Other</option></select></div>
<div class="field"><label>Source URL (optional)</label><input type="url" id="source" placeholder="https://arxiv.org/..." ></div>
<button type="submit">Submit Concept</button>
<div class="success" id="successMsg">Submitted. If it belongs in the language, it will be there. 👾</div>
</form>
</div>
<footer>&copy; 2026 AgentiScript</footer>
<script>
document.getElementById("submitForm").addEventListener("submit",function(e){
e.preventDefault();
fetch("https://lead-form-handler.portability.workers.dev",{
method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({concept:document.getElementById("concept").value,definition:document.getElementById("definition").value,category:document.getElementById("category").value,source:document.getElementById("source").value,type:"agentiscript-submit"})
}).catch(()=>{});
document.getElementById("submitForm").style.display="none";
document.getElementById("successMsg").style.display="block";
});
</script>
</body></html>
